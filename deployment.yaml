apiVersion: apps/v1
kind: Deployment
metadata:
  name: evennia
  namespace: evennia
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app: evennia
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: evennia
  template:
    metadata:
      labels:
        app: evennia
    spec:
      initContainers:
        - name: init-game
          image: evennia/evennia:latest
          command: ["/bin/sh", "/config/init.sh"]
          volumeMounts:
            - name: game-data
              mountPath: /usr/src/game
            - name: config
              mountPath: /config
            - name: admin-secret
              mountPath: /secrets
              readOnly: true
      containers:
        - name: evennia
          image: evennia/evennia:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              cd /usr/src/game
              rm -f server/*.pid 2>/dev/null || true
              evennia start -l
          ports:
            - containerPort: 4000
              name: telnet
            - containerPort: 4001
              name: web
            - containerPort: 4002
              name: websocket
          volumeMounts:
            - name: game-data
              mountPath: /usr/src/game
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
      volumes:
        - name: game-data
          persistentVolumeClaim:
            claimName: evennia-data
        - name: config
          configMap:
            name: evennia-config
            defaultMode: 0755
        - name: nginx-config
          configMap:
            name: evennia-config
        - name: admin-secret
          secret:
            secretName: evennia-admin
