apiVersion: v1
kind: ConfigMap
metadata:
  name: evennia-config
  namespace: evennia
data:
  nginx.conf: |
    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://localhost:4001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /ws {
            proxy_pass http://localhost:4002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 86400;
        }
    }

  game-settings.py: |
    # DorfinMUD settings for Kubernetes + Cloudflare Tunnel deployment
    # Appended to default settings.py by init container

    WEBSOCKET_CLIENT_URL = "wss://dorfin.johnasendorf.com/ws"
    ALLOWED_HOSTS = ["dorfin.johnasendorf.com", "localhost", "127.0.0.1"]
    SERVERNAME = "DorfinMUD"

    # Override MSSP hostname so MUD clients (Mudlet) don't try to resolve the pod/node hostname
    MSSP_META_INFO = {
        "HOSTNAME": "192.168.50.200",
    }

    WEBSERVER_INTERFACES = ["0.0.0.0"]
    WEBSOCKET_CLIENT_INTERFACE = "0.0.0.0"
    TELNET_INTERFACES = ["0.0.0.0"]

  main-content.html: |
    <h1 class="card-title">Welcome to DorfinMUD!</h1>
    <hr/>
    <p class="lead">A MUD powered by Evennia.</p>
    <p>
        Jump right in using the browser-based client below.
    </p>
    {% if webclient_enabled %}
    <p><a href="{% url 'webclient:index' %}" class="playbutton">Play in the browser!</a></p>
    {% endif %}

  init.sh: |
    #!/bin/sh
    set -e
    GAME_DIR="/usr/src/game"

    if [ ! -f "$GAME_DIR/server/conf/settings.py" ]; then
        echo "=== First-time initialization ==="
        cd /usr/src
        evennia --init mygame
        cp -a /usr/src/mygame/* "$GAME_DIR/"
        cp -a /usr/src/mygame/.* "$GAME_DIR/" 2>/dev/null || true
        rm -rf /usr/src/mygame
        cd "$GAME_DIR"
        cat /config/game-settings.py >> "$GAME_DIR/server/conf/settings.py"
        echo "=== Initialization complete ==="
    else
        echo "=== Game directory already initialized ==="
        if ! grep -q "WEBSOCKET_CLIENT_URL" "$GAME_DIR/server/conf/settings.py"; then
            cat /config/game-settings.py >> "$GAME_DIR/server/conf/settings.py"
        fi
    fi

    # Copy custom homepage template
    mkdir -p "$GAME_DIR/web/templates/website/homepage"
    cp /config/main-content.html "$GAME_DIR/web/templates/website/homepage/main-content.html"

    # All evennia CLI commands check for Account #1 and loop without TTY.
    # Use Django internals directly to avoid this.
    cd "$GAME_DIR"
    ADMIN_USER=$(cat /secrets/username)
    ADMIN_PASS=$(cat /secrets/password)
    echo "=== Running migrations and ensuring superuser ==="
    python -c "
    import sys,os
    sys.path.insert(0,'.')
    os.environ['DJANGO_SETTINGS_MODULE']='server.conf.settings'
    import django;django.setup()
    from django.core.management import call_command
    call_command('migrate','--noinput')
    from evennia.accounts.models import AccountDB
    if not AccountDB.objects.filter(id=1).exists():
        AccountDB.objects.create_superuser('$ADMIN_USER','','$ADMIN_PASS')
        print('Superuser created')
    else:
        print('Superuser already exists')
    "
