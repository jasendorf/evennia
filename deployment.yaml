apiVersion: apps/v1
kind: Deployment
metadata:
  name: evennia
  namespace: evennia
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app: evennia
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: evennia
  template:
    metadata:
      labels:
        app: evennia
      annotations:
        deployment.dorfin.io/commit: "36967f8f6dd1ed4fde84ad270b08bc79304e8e5f"
    spec:
      initContainers:
        - name: git-sync
          image: alpine/git:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              REPO_URL="http://$(cat /secrets/gitea-token)@192.168.50.199:30000/lab/evennia"
              GAME_DIR="/usr/src/game"
              SYNC_DIR="/usr/src/game-repo"

              echo "=== Syncing game code from Gitea ==="
              if [ -d "$SYNC_DIR/.git" ]; then
                cd "$SYNC_DIR"
                git pull
              else
                git clone "$REPO_URL" "$SYNC_DIR"
              fi

              if [ ! -d "$SYNC_DIR/game" ]; then
                echo "=== No game/ folder found in repo, skipping sync ==="
                exit 0
              fi

              apk add --no-cache rsync > /dev/null 2>&1

              # Repo-managed directories — only these get --delete treatment.
              # web/ is NOT included: Evennia generates web/urls.py and other
              # files at init time that must not be deleted.
              # Everything else on the PVC (server/, db, logs) is also untouched.
              SYNC_DIRS="commands typeclasses contrib contrib_dorfin world"

              echo "=== Syncing repo-managed directories ==="
              for dir in $SYNC_DIRS; do
                if [ -d "$SYNC_DIR/game/$dir" ]; then
                  mkdir -p "$GAME_DIR/$dir"
                  rsync -a --delete "$SYNC_DIR/game/$dir/" "$GAME_DIR/$dir/"
                  echo "  synced $dir/"
                else
                  if [ -d "$GAME_DIR/$dir" ]; then
                    rm -rf "$GAME_DIR/$dir"
                    echo "  removed $dir/ (no longer in repo)"
                  fi
                fi
              done

              # web/ gets overlay only (cp -a), never --delete.
              # Preserves Evennia-generated files like web/urls.py.
              if [ -d "$SYNC_DIR/game/web" ]; then
                cp -a "$SYNC_DIR/game/web/." "$GAME_DIR/web/"
                echo "  overlaid web/ (no delete)"
              fi

              # Copy any top-level files from game/ (e.g. __init__.py)
              find "$SYNC_DIR/game" -maxdepth 1 -type f -exec cp -a {} "$GAME_DIR/" \;

              # Purge __pycache__ to prevent stale bytecode
              find "$GAME_DIR" -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true

              echo "=== Game code sync complete ==="
          volumeMounts:
            - name: game-data
              mountPath: /usr/src/game
            - name: repo-cache
              mountPath: /usr/src/game-repo
            - name: gitea-token
              mountPath: /secrets
              readOnly: true

        - name: init-game
          image: evennia/evennia:latest
          command: ["/bin/sh", "/config/init.sh"]
          volumeMounts:
            - name: game-data
              mountPath: /usr/src/game
            - name: config
              mountPath: /config
            - name: admin-secret
              mountPath: /secrets
              readOnly: true

      containers:
        - name: evennia
          image: evennia/evennia:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              cd /usr/src/game
              rm -f server/*.pid 2>/dev/null || true
              evennia start -l
          ports:
            - containerPort: 4000
              name: telnet
            - containerPort: 4001
              name: web
            - containerPort: 4002
              name: websocket
          volumeMounts:
            - name: game-data
              mountPath: /usr/src/game
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"

      volumes:
        - name: game-data
          persistentVolumeClaim:
            claimName: evennia-data
        - name: repo-cache
          emptyDir: {}
        - name: config
          configMap:
            name: evennia-config
            defaultMode: 0755
        - name: nginx-config
          configMap:
            name: evennia-config
        - name: admin-secret
          secret:
            secretName: evennia-admin
        - name: gitea-token
          secret:
            secretName: gitea-token
