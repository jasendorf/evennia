apiVersion: apps/v1
kind: Deployment
metadata:
  name: evennia
  namespace: evennia
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app: evennia
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: evennia
  template:
    metadata:
      labels:
        app: evennia
      annotations:
        deployment.dorfin.io/commit: "f4c8d51f347b906ede058a6ce49688a265e238c3"
    spec:
      initContainers:
        - name: git-sync
          image: alpine/git:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              REPO_URL="http://$(cat /secrets/gitea-token)@192.168.50.199:30000/lab/evennia"
              GAME_DIR="/usr/src/game"
              SYNC_DIR="/usr/src/game-repo"

              echo "=== Syncing game code from Gitea ==="
              if [ -d "$SYNC_DIR/.git" ]; then
                cd "$SYNC_DIR"
                git pull
              else
                git clone "$REPO_URL" "$SYNC_DIR"
              fi

              # Overlay our custom game files onto the PVC
              # Only runs if the game/ folder exists in the repo
              if [ -d "$SYNC_DIR/game" ]; then
                echo "=== Copying custom game files to PVC ==="
                cp -a "$SYNC_DIR/game/." "$GAME_DIR/"
                echo "=== Game code sync complete ==="
              else
                echo "=== No game/ folder found in repo, skipping overlay ==="
              fi
          volumeMounts:
            - name: game-data
              mountPath: /usr/src/game
            - name: repo-cache
              mountPath: /usr/src/game-repo
            - name: gitea-token
              mountPath: /secrets
              readOnly: true

        - name: init-game
          image: evennia/evennia:latest
          command: ["/bin/sh", "/config/init.sh"]
          volumeMounts:
            - name: game-data
              mountPath: /usr/src/game
            - name: config
              mountPath: /config
            - name: admin-secret
              mountPath: /secrets
              readOnly: true

      containers:
        - name: evennia
          image: evennia/evennia:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              cd /usr/src/game
              rm -f server/*.pid 2>/dev/null || true
              evennia start -l
          ports:
            - containerPort: 4000
              name: telnet
            - containerPort: 4001
              name: web
            - containerPort: 4002
              name: websocket
          volumeMounts:
            - name: game-data
              mountPath: /usr/src/game
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"

      volumes:
        - name: game-data
          persistentVolumeClaim:
            claimName: evennia-data
        - name: repo-cache
          emptyDir: {}
        - name: config
          configMap:
            name: evennia-config
            defaultMode: 0755
        - name: nginx-config
          configMap:
            name: evennia-config
        - name: admin-secret
          secret:
            secretName: evennia-admin
        - name: gitea-token
          secret:
            secretName: gitea-token
